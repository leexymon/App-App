<h2>Student List</h2>
<a href="/">Add Student</a>
<table border="1">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Age</th>
    <th>Course</th>
    <th>Del</th>
    <th>Edit</th>
</tr>
{% for student in students %}

<tr>
    <td>{{ student[0] }}</td>
    <td>{{ student[1] }}</td>
    <td>{{ student[2] }}</td>
    <td>{{ student[3] }}</td>
    <td><a href="/delete/{{ student[0] }}" onclick="return confirm('Are you sure you want to delete this student?')">Delete</a></td>
    <td><a href="/edit/{{ student[0] }}">Edit</a></td>
</tr>

{% endfor %}
</table>
